name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check all sites
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          SITES=(
            "https://horeca-ai.ru|HoReCa Landing"
            "https://app.horeca-ai.ru|HoReCa App"
            "https://mini.horeca-ai.ru|HoReCa Mini"
            "https://aiassistpro.ru|AI Assist Pro"
            "https://seller.aiassistpro.ru|Seller Assistant"
            "https://alexsoll.ru|n8n"
            "https://status.horeca-ai.ru|Uptime Kuma"
          )

          DOWN=""
          for site_info in "${SITES[@]}"; do
            IFS='|' read -r url name <<< "$site_info"
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$url" 2>/dev/null)
            if [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ]; then
              echo "DOWN: $name ($url) -> connection failed"
              DOWN="${DOWN}\n- ${name}: connection failed"
            elif [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then
              echo "DOWN: $name ($url) -> HTTP $HTTP_CODE"
              DOWN="${DOWN}\n- ${name}: HTTP ${HTTP_CODE}"
            else
              echo "OK: $name -> HTTP $HTTP_CODE"
            fi
          done

          if [ -n "$DOWN" ]; then
            MSG=$(printf "SITES DOWN (external check):\n%b\n\nTime: $(date -u '+%Y-%m-%d %H:%M UTC')" "$DOWN")
            curl -sf -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TG_CHAT_ID" \
              --data-urlencode "text=$MSG" > /dev/null 2>&1
            echo "::error::Alert sent - some sites are down"
            exit 1
          fi
          echo "All sites OK"
